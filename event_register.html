<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Registration - Campus Event Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
      body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        background-color: #fffaf5;
        color: #333;
    }
    header {
        background-color: white;
        padding: 1rem 2.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    /* This is the corrected part: Flex styles are now on the container */
    header .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
    }
    header h1 {
        color: #d2691e;
        font-size: 1.5rem;
        margin: 0; /* Remove default margin */
    }
    nav {
        display: flex;
        gap: 1.5rem;
        align-items: center;
    }
    nav a {
        text-decoration: none;
        color: #555;
        font-weight: 600;
        transition: color 0.3s;
        white-space: nowrap; /* Prevent link text from breaking */
    }
    nav a:hover {
        color: #ff7f50;
    }
    .event-register-container {
        max-width: 600px;
        margin: 2.5rem auto;
        padding: 2.5rem;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.07);
    }
    h2 {
        text-align: center;
        color: #d2691e;
        margin-top: 0;
        margin-bottom: 2rem;
    }
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
    }
    input, select, textarea {
        width: 100%;
        padding: 12px;
        margin-bottom: 1.2rem;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-family: 'Poppins', sans-serif;
        font-size: 1rem;
    }
    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #ff9966;
    }
    button {
        width: 100%;
        padding: 14px;
        background-color: #ff9966;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    button:hover {
        background-color: #ff884d;
    }

    /* Responsive styles for navigation */
    @media (max-width: 992px) {
        nav {
            gap: 1rem;
        }
        nav a {
            font-size: 0.9rem;
        }
    }

    @media (max-width: 768px) {
        header .container {
            flex-direction: column;
        }
        header h1 {
            margin-bottom: 1rem;
        }
        nav {
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Campus Event Hub</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="event_register.html">Event Registration</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <div class="event-register-container">
    <h2>Register for an Event</h2>
    <form id="registrationForm">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Your full name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Your email" required>

      <label for="studentid">Student ID</label>
      <input type="text" id="studentid" name="studentid" placeholder="Your student ID" required>

      <label for="event">Select Event</label>
      <select id="event" name="event" required>
        <option value="">-- Loading Events --</option>
        <!-- Event options will be dynamically inserted here by JavaScript -->
      </select>

      <label for="comments">Additional Comments</label>
      <textarea id="comments" name="comments" rows="4" placeholder="Any special requirements..."></textarea>

      <button type="submit">Submit Registration</button>
    </form>
  </div>

  <script>
    window.addEventListener('load', function() {
        const eventSelect = document.getElementById('event');
        
        // 1. Get events from localStorage
        const events = JSON.parse(localStorage.getItem('events')) || [];

        // 2. Clear the default "Loading" option
        eventSelect.innerHTML = '';

        // 3. Add a default, non-selectable option
        const defaultOption = document.createElement('option');
        defaultOption.value = "";
        defaultOption.textContent = "-- Select an event --";
        eventSelect.appendChild(defaultOption);

        // 4. Check if there are any events
        if (events.length === 0) {
            defaultOption.textContent = "No events available"; // Update default text
            defaultOption.disabled = true;
            return;
        }

        // 5. Loop through the events and create an <option> for each one
        events.forEach(event => {
            const option = document.createElement('option');
            // Use the event name for both the value and the text for simplicity
            option.value = event.name; 
            option.textContent = event.name;
            eventSelect.appendChild(option);
        });
    });

    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault();
        alert('Registration submitted successfully!');
        this.reset();
    });
  </script>

</body>
</html>
