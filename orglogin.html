<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Organizer Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(to right, #ffd6b3, #ffe5cc);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 150px;
      background: url('https://svgshare.com/i/126c.svg') repeat-x;
      background-size: contain;
      animation: wave 10s linear infinite;
    }

    @keyframes wave {
      from { background-position-x: 0; }
      to { background-position-x: 1000px; }
    }

    .login-container {
      background-color: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
      z-index: 1;
    }

    .login-container h2 {
      color: #d2691e;
      margin-bottom: 20px;
    }

    .login-container input[type="text"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      transition: 0.3s;
    }

    .login-container input[type="text"]:focus,
    .login-container input[type="password"]:focus {
      border-color: #ff9966;
      outline: none;
    }

    .login-container input[type="submit"] {
      width: 100%;
      background-color: #ff9966;
      color: white;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-container input[type="submit"]:hover {
      background-color: #ff884d;
    }

    .login-container p {
      margin-top: 10px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>
  
  <div class="login-container">
    <h2>Organizer Login</h2>
    <form id="loginForm">
      <input type="text" name="username" placeholder="Username">
      <input type="password" name="password" placeholder="Password">
      <input type="submit" value="Login">
    </form>
    <p>Only authorized users can create events</p>
  </div>

  <div class="wave"></div>

  <script>
    // --- Handle Login Form Submission ---
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      // Prevent the form from actually submitting and reloading the page
      event.preventDefault();
      
      // Show a simple alert message
      alert('Login Successful!');
      
      // Redirect to the admin dashboard page after the user clicks "OK"
      window.location.href = 'admin_dashboard.html'; 
    });
  </script>

</body>
</html>
